<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#0f0f0f,#1a002b);color:white;}
.container{background:rgba(255,255,255,0.05);padding:40px;border-radius:20px;width:100%;max-width:400px;backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);}
h2{text-align:center;margin-bottom:25px;color:#b026ff;}
input{width:100%;padding:12px;margin:10px 0;border:none;border-radius:12px;background:rgba(255,255,255,0.1);color:white;}
input:focus{outline:none;background:rgba(255,255,255,0.2);}
button{width:100%;padding:14px;margin-top:15px;border:none;border-radius:30px;background:linear-gradient(45deg,#b026ff,#6a00ff);color:white;font-weight:600;font-size:16px;cursor:pointer;transition:0.3s;}
button:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(176,38,255,0.5);}
p.notice{font-size:14px;color:#ccc;text-align:center;margin-top:15px;}
</style>
</head>
<body>

<div class="container">
<h2>Admin Login</h2>

<input type="email" id="email" placeholder="Email" />
<input type="password" id="password" placeholder="Password" />
<button id="loginBtn">Login</button>

<p class="notice">Only authorized admins can login. Powered by Firebase Authentication.</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDyZbGtqcZ0Pggwnk_wUAA_Sjn8XNIXtbI",
  authDomain: "stock-side.firebaseapp.com",
  projectId: "stock-side",
  storageBucket: "stock-side.firebasestorage.app",
  messagingSenderId: "650352784923",
  appId: "1:650352784923:web:59e29f1567abb56925eabe",
  measurementId: "G-7L6GF875ED"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// تحقق إذا المستخدم مسجل الدخول مسبقاً
onAuthStateChanged(auth, user=>{
  if(user){
    // هنا القواعد في Firebase هي اللي هتتحكم مين مسموح له يدخل dashboard
    window.location.href = "dashboard.html";
  }
});

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const loginBtn = document.getElementById("loginBtn");

loginBtn.onclick = async ()=>{
  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();
  if(!email || !password){alert("Enter email and password"); return;}
  try{
    await signInWithEmailAndPassword(auth,email,password);
    alert("تم تسجيل الدخول بنجاح!");
    window.location.href = "dashboard.html";
  }catch(err){
    alert("Login failed: "+err.message);
  }
};
</script>

</body>
</html>
